<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- cdn font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- link css -->

    <link rel="stylesheet" href="../css/main.css">
    <title>shop page</title>
</head>

<body>


    <!-- star header -->
    <div class="header" id="header">
        <div class="top-header">
            <div class="top-header-content">
                <div class="summer-sale">
                    <p class="summer-sale-details">Summer Sale For All Swim Suits And Free Express Delivery - OFF 50%!
                    </p>
                    
                </div>
                <select name="language" id="select-language">
                    <option value="english">English</option>
                    <option value="french">French</option>
                </select>
            </div>
        </div>
        <div class="container">
            <div class="bottom-header">
                <div class="logo">
                    <a href="/index.html">E-SHOP</a>
                </div>

                <div class="navbar">
                    <ul class="nav-list">
                        <li class="items"><a class="active link" href="/index.html">Home</a></li>
                        <li class="items"><a class="link" href="#contact">Contact</a></li>
                        <li class="items"><a class="link" href="#signup">Sign Up</a></li>
                    </ul>

                </div>

                <div class="actions-navbar">
                    <button class="toggle-menu">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="input-field">
                        <input type="text" class="inputSearch" placeholder="Search...">
                        <button class="btn-search"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                    <button class="shopping-cart">
                        <i class="fa-solid fa-cart-plus"></i>
                        <span class="count-shopping-cart">0</span>
                    </button>
                    <button class="heart">
                        <i class="fa-solid fa-heart"></i>
                        <span class="count-heart">0</span>
                    </button>
                    <button class="theme-switcher">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                </div>
                <div class="scrool-width"></div>
            </div>
        </div>
    </div>
    <!-- end header -->
    <main>
        <div class="side-bar active">
            <div class="wish-list">wish-list</div>
            <div class="added-list">added-list</div>
        </div>
        <div class="modal"></div>
    </main>


    <script type="module" src="/assets/scripts/main.js"></script>
</body>

</html>
